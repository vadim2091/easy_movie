{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Заголовок -->
    <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-yellow-500 to-orange-500 bg-clip-text text-transparent">
            Чат поддержки
        </h1>
        <p class="text-lg text-gray-600 dark:text-gray-400">
            Мы онлайн и готовы помочь!
        </p>
    </div>

    <!-- Чат -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden">
        <!-- Шапка чата -->
        <div class="bg-gradient-to-r from-yellow-500 to-orange-500 p-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-headset text-white text-xl"></i>
                </div>
                <div>
                    <h3 class="text-white font-bold">Поддержка Easy Movie</h3>
                    <p class="text-white/80 text-sm">
                        <span class="inline-block w-2 h-2 bg-green-400 rounded-full animate-pulse mr-2"></span>
                        Онлайн
                    </p>
                </div>
            </div>
        </div>

        <!-- Сообщения -->
        <div class="h-96 overflow-y-auto p-4 bg-gray-50 dark:bg-gray-900" id="chat-messages">
            <!-- Приветственное сообщение -->
            <div class="flex items-start space-x-3 mb-4">
                <div class="w-8 h-8 bg-yellow-500 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0">
                    EM
                </div>
                <div class="max-w-xs">
                    <div class="bg-white dark:bg-gray-700 rounded-2xl rounded-tl-none p-3 shadow-sm">
                        <p class="text-sm text-gray-800 dark:text-gray-200">Здравствуйте! Чем мы можем вам помочь?</p>
                    </div>
                    <span class="text-xs text-gray-500 mt-1">Поддержка • сейчас</span>
                </div>
            </div>

            <!-- Динамические сообщения будут добавляться сюда -->
        </div>

        <!-- Форма отправки -->
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <div class="flex items-center space-x-3">
                <input type="text" 
                       id="message-input"
                       placeholder="Введите сообщение..." 
                       class="flex-1 px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-500">
                <button onclick="sendMessage()" 
                        class="bg-gradient-to-r from-yellow-500 to-orange-500 text-white px-6 py-3 rounded-xl hover:from-yellow-600 hover:to-orange-600 transition shadow-lg">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
<script>
    const socket = io();
    const currentUserId = {{ current_user.id }};
    const currentUsername = "{{ current_user.username }}";

    socket.on('connect', function() {
        console.log('✅ Подключено к чату');
    });

    socket.on('new_message', function(data) {
        addMessage(data);
    });

    function sendMessage() {
        const input = document.getElementById('message-input');
        const message = input.value.trim();
        
        if (!message) return;
        
        socket.emit('send_message', { message: message });
        input.value = '';
    }

    function addMessage(data) {
        const messagesDiv = document.getElementById('chat-messages');
        const messageDiv = document.createElement('div');
        
        const isMyMessage = data.user_id === currentUserId;
        
        messageDiv.className = `flex mb-4 ${isMyMessage ? 'justify-end' : 'justify-start'}`;
        
        messageDiv.innerHTML = `
            <div class="max-w-xs">
                <div class="flex items-center ${isMyMessage ? 'justify-end' : 'justify-start'} mb-1">
                    <span class="text-xs text-gray-500">${data.username}</span>
                    <span class="text-xs text-gray-500 mx-2">•</span>
                    <span class="text-xs text-gray-500">${data.time || 'сейчас'}</span>
                </div>
                <div class="rounded-2xl p-3 ${data.is_admin ? 'bg-gradient-to-r from-yellow-500 to-orange-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white'}">
                    ${data.message}
                </div>
            </div>
        `;
        
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    document.getElementById('message-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>
{% endblock %}
